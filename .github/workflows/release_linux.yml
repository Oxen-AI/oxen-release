name: 🚀 Release Linux

on:
  workflow_call:
    inputs:
      ARCHITECTURE:
        description: "The architecture to build for"
        required: true
        default: "x86_64"
        type: string
      AWS_ROLE:
        description: "AWS role to assume"
        required: true
        type: string
      AWS_REGION:
        description: "AWS region"
        required: true
        type: string
    secrets:
      GH_PERSONAL_ACCESS_TOKEN:
        description: "GitHub personal access token"
        required: true

jobs:
  start-self-hosted-runner:
    name: Start self-hosted EC2 runner
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.start-ec2-runner.outputs.label }}
      ec2-instance-id: ${{ steps.start-ec2-runner.outputs.ec2-instance-id }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.AWS_ROLE }}
          role-duration-seconds: 900
          aws-region: ${{ inputs.AWS_REGION }}

      - name: Set image and instance type
        run: |
          if [ "${{ inputs.ARCHITECTURE }}" = "arm64" ]; then
            echo "EC2_IMAGE_ID=ami-095764d706219bade" >> $GITHUB_ENV
            echo "EC2_INSTANCE_TYPE=m7g.4xlarge" >> $GITHUB_ENV
          else
            echo "EC2_IMAGE_ID=ami-" >> $GITHUB_ENV
            echo "EC2_INSTANCE_TYPE=m6i.4xlarge" >> $GITHUB_ENV
          fi

      - name: Start EC2 runner
        id: start-ec2-runner
        uses: machulav/ec2-github-runner@v2
        with:
          mode: start
          github-token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          ec2-image-id: ${{ env.EC2_IMAGE_ID }}
          ec2-instance-type: ${{ env.EC2_INSTANCE_TYPE }}
          subnet-id: subnet-0e28805edbdad482f
          security-group-id: sg-09c8aa5830122d671
          aws-resource-tags: >
            [
              {"Key": "Name", "Value": "ec2-github-runner"}
            ]
   
  release_linux:
    needs: start-self-hosted-runner
    runs-on: ${{ needs.start-self-hosted-runner.outputs.label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set env
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/v}" >> $GITHUB_ENV

      - name: Install rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source /root/.cargo/env
          echo $PATH
          cargo build --release

      # - name: Install system dependencies
      #   run: |
          

      - name: Build oxen
        run: |
          cargo build --release

      - name: Package Oxen binaries
        run: |
          mkdir -p oxen-linux-x86_64
          mkdir -p oxen-server-linux-x86_64
          cp target/release/oxen oxen-linux-x86_64/oxen
          cp target/release/oxen-server oxen-server-linux-x86_64/oxen-server
          tar czf oxen-linux-x86_64.tar.gz oxen-linux-x86_64
          tar czf oxen-server-linux-x86_64.tar.gz oxen-server-linux-x86_64

      - name: Package Oxen deb package
        run: |
          fpm \
            -s dir -t deb \
            -p oxen-linux-x86_64.deb \
            -C target/release \
            --name oxen \
            --version ${{ env.RELEASE_VERSION }} \
            --architecture all \
            --description "Oxen is a command line tool to version and manage large machine learning datasets" \
            --url "https://oxen.ai" \
            --maintainer "OxenAI hello@oxen.ai" \
            oxen=/usr/bin/oxen

          fpm \
            -s dir -t deb \
            -p oxen-server-linux-x86_64.deb \
            -C target/release \
            --name oxen-server \
            --version ${{ env.RELEASE_VERSION }} \
            --architecture all \
            --description "oxen-server is the server for oxen to version and manage large machine learning datasets" \
            --url "https://oxen.ai" \
            --maintainer "OxenAI hello@oxen.ai" \
            oxen-server=/usr/bin/oxen-server

